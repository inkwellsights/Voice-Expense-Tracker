services:
  expenseowl:
    image: tanq16/expenseowl:main
    container_name: expenseowl
    restart: unless-stopped
    # ExpenseOwl serves on 8080 inside the container. We expose it on the host
    # at 5006 to match the rest of this project's docs.
    ports:
      - "5006:8080"
    volumes:
      - ./data/expenseowl:/app/data
    environment:
      - TZ=Asia/Dhaka
    networks:
      - tracker

  bot:
    build: .
    image: voice-expense-bot:latest
    container_name: voice-expense-bot
    restart: unless-stopped
    depends_on:
      - expenseowl
    env_file:
      - .env
    environment:
      # Inside the compose network the bot reaches ExpenseOwl on its real
      # container port (8080), not the host-side mapping.
      - EXPENSEOWL_URL=http://expenseowl:8080
      - TZ=Asia/Dhaka
    volumes:
      # Holds the dynamic allowlist (data/bot/allowed_users.json) and any
      # future stateful files the bot writes. Survives `up -d --build`.
      - ./data/bot:/app/data
    networks:
      - tracker

  # HTML-injection reverse proxy. Sits between Cloudflare Tunnel and
  # ExpenseOwl, injects a <script> into every dashboard page that adds
  # a multi-select tag-filter dropdown to the pie chart (/) and the
  # table (/table). Filtering is client-side via a fetch hook; the
  # proxy itself does not filter any JSON. Selection persists in
  # sessionStorage (sticky per browser session, default = show all).
  proxy:
    build: ./expense-proxy
    image: expense-proxy:latest
    container_name: expense-proxy
    restart: unless-stopped
    depends_on:
      - expenseowl
    environment:
      - EXPENSEOWL_URL=http://expenseowl:8080
      - TZ=Asia/Dhaka
    ports:
      # Published so the host-side cloudflared service can reach it.
      - "5007:5007"
    networks:
      - tracker

networks:
  tracker:
    driver: bridge
